<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MEME Cute Tavern</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#fdf2f8,#e0e7ff);
color:#1f2937
}
#app{display:flex;height:100vh}

/* 左侧 */
#sidebar{
width:260px;
background:#fff;
border-right:1px solid #ddd;
padding:10px;
overflow:auto
}
.char{
display:flex;
align-items:center;
padding:8px;
border-radius:12px;
cursor:pointer;
transition:0.2s
}
.char:hover{background:#f3e8ff}
.avatar{
width:40px;height:40px;
border-radius:50%;
background:#ddd;
margin-right:10px;
object-fit:cover
}

/* 中间 */
#chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;overflow:auto;padding:15px}
.msg{margin-bottom:10px}
.bubble{
display:inline-block;
padding:10px;
border-radius:15px;
max-width:70%
}
.user{text-align:right}
.user .bubble{background:#a5b4fc;color:#fff}
.ai .bubble{background:#fff}

/* 输入 */
#input{display:flex;padding:10px;background:#fff}
#input input{
flex:1;
border:1px solid #ddd;
border-radius:10px;
padding:10px
}

/* 表情 */
#emoji{padding:5px}
</style>
</head>

<body>

<div id="app">

<div id="sidebar">
<button onclick="newChar()">+角色</button>
<input type="file" onchange="uploadAvatar(event)">
<div id="charList"></div>
</div>

<div id="chat">
<div id="messages"></div>

<div id="emoji">
<button onclick="addEmoji('😊')">😊</button>
<button onclick="addEmoji('😡')">😡</button>
<button onclick="addEmoji('😭')">😭</button>
</div>

<div id="input">
<input id="text">
<button onclick="send()">发送</button>
</div>
</div>

</div>

<script>

let chars=JSON.parse(localStorage.chars||"[]")
let messages=[]
let current=null

function save(){
localStorage.chars=JSON.stringify(chars)
}

/* ===== 角色 ===== */
function newChar(){
const id=Date.now()
chars.push({id,name:"新角色",avatar:"",content:""})
current=id
save()
renderChars()
}

function renderChars(){
const box=document.getElementById("charList")
box.innerHTML=""
chars.forEach(c=>{
const d=document.createElement("div")
d.className="char"
d.innerHTML=`
<img class="avatar" src="${c.avatar||''}">
${c.name}
`
d.onclick=()=>current=c.id
box.appendChild(d)
})
}

/* ===== 头像上传 ===== */
function uploadAvatar(e){
const file=e.target.files[0]
const reader=new FileReader()
reader.onload=()=>{
const c=chars.find(x=>x.id==current)
c.avatar=reader.result
save()
renderChars()
}
reader.readAsDataURL(file)
}

/* ===== 表情 ===== */
function addEmoji(e){
document.getElementById("text").value+=e
}

/* ===== 流式输出 ===== */
async function stream(text,cb){
let i=0
function step(){
if(i<text.length){
cb(text.slice(0,i++))
setTimeout(step,15)
}
}
step()
}

/* ===== AI ===== */
async function callAI(input){
const res=await fetch(localStorage.baseUrl+"/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+localStorage.apiKey
},
body:JSON.stringify({
model:localStorage.model,
messages:[{role:"user",content:input}]
})
})
const data=await res.json()
return data.choices[0].message.content
}

/* ===== 聊天 ===== */
function render(){
const box=document.getElementById("messages")
box.innerHTML=""
messages.forEach(m=>{
const d=document.createElement("div")
d.className="msg "+(m.role==="user"?"user":"ai")
const b=document.createElement("div")
b.className="bubble"
b.innerText=m.content
d.appendChild(b)
box.appendChild(d)
})
}

async function send(){
const input=document.getElementById("text").value
messages.push({role:"user",content:input})
render()

const reply=await callAI(input)

messages.push({role:"assistant",content:""})
render()

let last=messages[messages.length-1]
await stream(reply,(t)=>{
last.content=t
render()
})

document.getElementById("text").value=""
}

renderChars()

/* ===== 拖拽导入 ===== */
document.body.ondrop=(e)=>{
e.preventDefault()
const file=e.dataTransfer.files[0]
const reader=new FileReader()
reader.onload=()=>{
const txt=reader.result
if(txt.includes("name:")){
chars.push({id:Date.now(),name:"导入角色",content:txt})
}
}
reader.readAsText(file)
}
document.body.ondragover=(e)=>e.preventDefault()

</script>

</body>
</html>
