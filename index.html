<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MEME Studio</title>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:sans-serif}
#app{display:flex;height:100vh}
#left{width:40%;border-right:1px solid #333;display:flex;flex-direction:column}
#chat{flex:1;overflow:auto;padding:10px}
.msg{margin-bottom:10px}
.user{text-align:right}
.bubble{display:inline-block;padding:10px;border-radius:10px}
.user .bubble{background:#2563eb}
.ai .bubble{background:#1e293b}
#input{display:flex;padding:10px}
#input input{flex:1}
#right{width:60%}
textarea{width:100%;height:100%;background:#020617;color:#fff}
button{margin:5px;padding:5px 10px}
</style>
</head>

<body>
<div id="app">

<div id="left">
  <div id="chat"></div>

  <div id="input">
    <input id="text"/>
    <button onclick="send()">发送</button>
  </div>
</div>

<div id="right">
  <textarea id="doc"></textarea>
</div>

</div>

<script>

let messages = []

function render(){
  const chat = document.getElementById("chat")
  chat.innerHTML = ""

  messages.forEach(m=>{
    const div = document.createElement("div")
    div.className = "msg " + (m.role==="user"?"user":"ai")

    const bubble = document.createElement("div")
    bubble.className = "bubble"
    bubble.innerText = m.content

    div.appendChild(bubble)

    // GUI按钮解析
    const match = m.content.match(/\[GUI\]([\s\S]*?)\[\/GUI\]/)
    if(match){
      const lines = match[1].split("\n")
      let btn

      lines.forEach(l=>{
        l=l.trim()
        if(l.startsWith("- text:")){
          btn = document.createElement("button")
          btn.innerText = l.replace("- text:","").trim()
        }
        if(l.startsWith("action:") && btn){
          const action = l.replace("action:","").trim()
          btn.onclick = ()=>send(action)
          div.appendChild(btn)
        }
      })
    }

    chat.appendChild(div)
  })
}

async function callAI(input){

  const system = `
你是MEME角色创作助手：
- 擅长角色卡
- 风格清新
- 可以输出GUI按钮

当需要按钮时输出：

[GUI]
buttons:
 - text: 示例
   action: /character 示例
[/GUI]
`

  const res = await fetch(localStorage.baseUrl + "/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+localStorage.apiKey
    },
    body:JSON.stringify({
      model:localStorage.model,
      messages:[
        {role:"system",content:system},
        ...messages,
        {role:"user",content:input}
      ]
    })
  })

  const data = await res.json()
  return data.choices[0].message.content
}

async function send(cmd){

  const input = cmd || document.getElementById("text").value

  let real = input

  if(input.startsWith("/character")){
    real = "生成角色卡："+input.replace("/character","")
  }
  if(input.startsWith("/clear")){
    messages=[]
    render()
    return
  }

  const res = await callAI(real)

  messages.push({role:"user",content:input})
  messages.push({role:"assistant",content:res})

  document.getElementById("doc").value = res
  document.getElementById("text").value=""

  render()
}

</script>
</body>
</html>
